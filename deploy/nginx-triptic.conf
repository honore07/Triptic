# Nginx — reverse proxy TRIPTIC (VPS Hostinger)
# /etc/nginx/sites-available/triptic → symlink dans sites-enabled

server {
    listen 80;
    server_name triptic.app www.triptic.app;

    # PWA — fichiers statiques buildés (apps/web/dist)
    root /opt/triptic/apps/web/dist;
    index index.html;

    # API Express derrière PM2
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE : ne pas bufferiser les événements
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # Service worker : jamais de cache long
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
